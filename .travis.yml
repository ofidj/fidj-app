language:
  - node_js
node_js:
   - 14
branches:
  only:
    - main
install:
 - git config remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
 - git fetch --tags --depth=10000
 - npm install
 - npm version patch -m "[ci skip] version bumped %s"
script:
 - npm test
 - npm run build-prod
after_success:
 - git remote add upstream "https://${GH_TOKEN}@github.com/${GH_REPO}.git"
 - git add .
 - git commit -m "[ci skip] version ok"
 - git push upstream HEAD:main
 - rm -r src
 - rm -r tests
 - rm -r coverage
 - rm -r node_modules
 - rm www/.gitignore
deploy:
  provider: pages
  skip-cleanup: true
  github-token: $GH_TOKEN
  keep-history: true
  on:
    branch: main
env:
  global:
    - GH_REPO: "ofidj/fidj-app"
