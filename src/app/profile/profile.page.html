<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>
            <img src="assets/fidj-logo.png" height="15em"> Home
        </ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <!-- Default Refresher -->
    <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Home</ion-title>
        </ion-toolbar>
    </ion-header>

    <form #profileForm="ngForm">
        <ion-grid>
            <ion-row>
                <ion-col size-md="8" offset-md="2" size-sm="12">
                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label position="floating">Email</ion-label>

                                <ion-input id="profileEmail"
                                           type="email" placeholder="valid.email@required.com" required
                                           [(ngModel)]="profileEmail" name="profileEmail"
                                           pattern=".{1,}@[_a-z0-9A-Z]+(\.[a-z0-9A-Z]+)+" readonly></ion-input>
                            </ion-item>
                        </ion-col>
                    </ion-row>
                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label position="floating">Mobile</ion-label>

                                <ion-input id="profileMobile"
                                           type="telephone"
                                           [(ngModel)]="profileMobile" name="profileMobile" readonly></ion-input>
                            </ion-item>
                        </ion-col>
                    </ion-row>

                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label position="floating">Name</ion-label>

                                <ion-input id="profileName"
                                           type="text"
                                           [(ngModel)]="profileName" name="profileName"></ion-input>
                            </ion-item>
                        </ion-col>
                    </ion-row>
                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label position="floating">Password</ion-label>

                                <ion-input id="profilePassword"
                                           type="password"
                                           [(ngModel)]="profilePassword" name="profilePassword"></ion-input>
                            </ion-item>
                        </ion-col>
                    </ion-row>

                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label position="fixed">Endpoints ({{appEndpoints.length}})</ion-label>
                                <ul>
                                    <li *ngFor="let endpoint of appEndpoints; let index = index">Endpoint {{ index }}
                                        : {{endpoint.key}} {{endpoint.blocked}}</li>
                                </ul>
                            </ion-item>
                            <ion-item *ngIf="profileAppsSubscribed">
                                profileAppsSubscribed : {{profileAppsSubscribed.length}}
                                profileAppsOwned : {{profileAppsOwned.length}}
                            </ion-item>
                        </ion-col>
                    </ion-row>

                    <ion-row>
                        <ion-col>
                            <ion-button color="primary" (click)="putChanges()" [disabled]="!me">Save</ion-button>
                        </ion-col>
                        <ion-col>
                            <p></p>
                        </ion-col>
                        <ion-col>
                            <ion-button color="danger" (click)="logout()">Logout</ion-button>
                        </ion-col>
                    </ion-row>
                </ion-col>
            </ion-row>
        </ion-grid>
    </form>

</ion-content>
