<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>
            <img src="assets/fidj-logo.png" height="15em"> Your profile
        </ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <!-- Default Refresher -->
    <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">Home</ion-title>
        </ion-toolbar>
    </ion-header>

    <form #profileForm="ngForm">
        <ion-grid>
            <ion-row>
                <ion-col size-md="8" offset-md="2" size-sm="12">
                    <ion-row>
                        <ion-col>
                            <ion-item>
                                <ion-label>Email</ion-label>
                                <ion-input id="profileEmail"
                                           type="email" placeholder="valid.email@required.com" required
                                           [(ngModel)]="profileEmail" name="profileEmail"
                                           pattern=".{1,}@[_a-z0-9A-Z]+(\.[a-z0-9A-Z]+)+" disabled></ion-input>
                            </ion-item>
                            <ion-item>
                                <ion-label>Mobile</ion-label>
                                <ion-input id="profileMobile"
                                           type="telephone"
                                           [(ngModel)]="profileMobile" name="profileMobile" disabled></ion-input>
                            </ion-item>
                            <ion-item>
                                <ion-label position="floating">Name</ion-label>
                                <ion-input id="profileName"
                                           type="text"
                                           [(ngModel)]="profileName" name="profileName"></ion-input>
                            </ion-item>
                            <ion-item>
                                <ion-label position="floating">Update your password</ion-label>
                                <ion-input id="profilePassword"
                                           type="password"
                                           [(ngModel)]="profilePassword" name="profilePassword"></ion-input>
                            </ion-item>
                            <!--
                            <ion-item>
                                <ion-label position="fixed">Endpoints ({{appEndpoints.length}})</ion-label>
                                <ul>
                                    <li *ngFor="let endpoint of appEndpoints; let index = index">Endpoint {{ index }}
                                        : {{endpoint.key}} {{endpoint.blocked}}</li>
                                </ul>
                            </ion-item>
                            -->
                            <ion-item *ngIf="profileAppsSubscribed">
                                Apps you subscribed : {{profileAppsSubscribed.length}}
                            </ion-item>
                            <ion-item *ngIf="profileAppsOwned">
                                Apps you owned : {{profileAppsOwned.length}}
                            </ion-item>
                        </ion-col>
                    </ion-row>

                    <ion-row>
                        <ion-col>
                            <ion-button color="primary" expand="block" (click)="putChanges()" [disabled]="!me">Update</ion-button>
                        </ion-col>
                        <ion-col>
                            <p></p>
                        </ion-col>
                        <ion-col>
                            <ion-button color="danger" expand="block" (click)="logout()">Logout</ion-button>
                        </ion-col>
                    </ion-row>

                    <ion-row style="padding-top: 2em;">
                        <ion-col>
                            <a href="https://api.fidj.ovh" target="_blank">You need more? Please use our API</a>
                        </ion-col>
                    </ion-row>


                </ion-col>
            </ion-row>
        </ion-grid>
    </form>

</ion-content>
