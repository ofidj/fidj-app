<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>
            <img src="assets/fidj-logo.png" height="15em"> {{appId}}
        </ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
    <!-- Default Refresher -->
    <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">{{appId}}</ion-title>
        </ion-toolbar>
    </ion-header>

    <ion-grid>
        <ion-row>
            <ion-col size-md="8" offset-md="2" size-sm="12">

                appId : {{appId}}

            </ion-col>
        </ion-row>
    </ion-grid>

</ion-content>
