<ion-header [translucent]="true">
    <ion-toolbar>
        <ion-title>
            <img src="assets/fidj-logo.png" height="15em"> {{appId}}
        </ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

    <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
    </ion-refresher>

    <ion-header collapse="condense">
        <ion-toolbar>
            <ion-title size="large">{{appId}}</ion-title>
        </ion-toolbar>
    </ion-header>

    <ion-grid>
        <ion-row>
            <ion-col size-md="8" offset-md="2" size-sm="12">

                <ion-item *ngIf="appDetail">
                    Title : {{appDetail.title}}
                </ion-item>
                <ion-item *ngIf="appDetail">
                    Description : {{appDetail.description}}
                </ion-item>
                <ion-item *ngIf="appDetail">
                    <img src="{{appDetail.badge}}"/>
                </ion-item>

            </ion-col>
        </ion-row>
    </ion-grid>

</ion-content>
