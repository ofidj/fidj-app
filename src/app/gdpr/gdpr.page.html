<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      <img src="assets/fidj-logo.png" height="15em"> GDPR
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Default Refresher -->
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">GDPR</ion-title>
    </ion-toolbar>
  </ion-header>

    <ion-grid>
      <ion-row>
        <ion-col size-md="8" offset-md="2" size-sm="12">

          <ion-list *ngIf="profileAppsSubscribed">
            <ion-item-sliding  *ngFor="let subscription of profileAppsSubscribed; let index = index">
              <ion-item>
                <ion-label>{{subscription.title}} - {{subscription.description}}</ion-label>
              </ion-item>
              <ion-item-options side="end">
                <ion-item-option (click)="remove(subscription)">Remove all my data</ion-item-option>
              </ion-item-options>
            </ion-item-sliding>
          </ion-list>

        </ion-col>
      </ion-row>
    </ion-grid>

</ion-content>
